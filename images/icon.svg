<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="12" fill="#1e1e1e"/>

  <!-- Grid dividers -->
  <line x1="64" y1="10" x2="64" y2="118" stroke="#007acc" stroke-width="2" opacity="0.6"/>
  <line x1="10" y1="64" x2="118" y2="64" stroke="#007acc" stroke-width="2" opacity="0.6"/>

  <!-- Top-left pane -->
  <rect x="10" y="10" width="50" height="50" rx="4" fill="#252526" stroke="#007acc" stroke-width="1.5"/>
  <!-- Terminal prompt top-left -->
  <text x="18" y="36" font-family="monospace" font-size="14" fill="#007acc" font-weight="bold">&gt;_</text>

  <!-- Top-right pane -->
  <rect x="68" y="10" width="50" height="50" rx="4" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <!-- Terminal prompt top-right (dimmed) -->
  <text x="76" y="36" font-family="monospace" font-size="14" fill="#555555" font-weight="bold">&gt;_</text>

  <!-- Bottom-left pane -->
  <rect x="10" y="68" width="50" height="50" rx="4" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <!-- Terminal prompt bottom-left (dimmed) -->
  <text x="18" y="94" font-family="monospace" font-size="14" fill="#555555" font-weight="bold">&gt;_</text>

  <!-- Bottom-right pane -->
  <rect x="68" y="68" width="50" height="50" rx="4" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <!-- Terminal prompt bottom-right (dimmed) -->
  <text x="76" y="94" font-family="monospace" font-size="14" fill="#555555" font-weight="bold">&gt;_</text>
</svg>
